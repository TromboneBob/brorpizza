<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Bror — Dashboard</title>
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link
      href="https://fonts.bunny.net/css?family=space-mono:400,700"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Space Mono", monospace;
        background: #fff;
        color: #000;
        min-height: 100vh;
        padding: 3rem 1rem 5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
      }

      h1 {
        font-size: 0.65rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #999;
      }

      .setup,
      .dashboard {
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
      }

      .setup {
        gap: 0.75rem;
      }

      .dashboard {
        gap: 2.5rem;
      }

      .field-label,
      .section-label {
        text-transform: uppercase;
        color: #999;
      }

      .field-label {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
      }

      .section-label {
        font-size: 0.55rem;
        letter-spacing: 0.25em;
        margin-bottom: 1rem;
      }

      .setup input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #fff;
        border: 1.5px solid #000;
        color: #000;
        font-family: "Space Mono", monospace;
        font-size: 0.9rem;
        outline: none;
      }

      .setup input:focus {
        border-color: #000;
        box-shadow: 2px 2px 0 #000;
      }

      .primary-btn {
        padding: 0.8rem;
        background: #000;
        border: 2px solid #000;
        color: #fff;
        font-family: "Space Mono", monospace;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .status-stamp {
        display: block;
        width: fit-content;
        margin: 0 0 1.5rem;
        padding: 0.5rem 1.5rem;
        border: 2.5px solid currentColor;
        box-shadow: inset 0 0 0 1.5px currentColor;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        transform: rotate(-1.5deg);
        color: #ccc;
      }

      .status-stamp.open {
        color: #1d6840;
      }

      .status-stamp.almostout {
        color: #b5551d;
      }

      .status-stamp.outofstock {
        color: #991c1c;
      }

      .status-stamp.closed {
        color: #777;
      }

      .btn-group,
      .pizza-grid {
        display: flex;
        flex-direction: column;
      }

      .btn-group {
        gap: 0.4rem;
      }

      .pizza-grid {
        gap: 1.25rem;
      }

      .btn,
      .pizza-btn {
        background: #fff;
        border: 1.5px solid #ddd;
        color: #bbb;
        font-family: "Space Mono", monospace;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: border-color 0.1s;
      }

      .btn {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        text-align: left;
      }

      .btn::before {
        content: "";
        display: inline-block;
        width: 8px;
        height: 8px;
        border: 1.5px solid #ddd;
        flex-shrink: 0;
      }

      .btn.active,
      .pizza-btn.active {
        background: #000;
        border-color: #000;
        color: #fff;
      }

      .btn.active::before {
        background: #fff;
        border-color: #fff;
      }

      .btn:not(.active):hover,
      .pizza-btn:not(.active):hover {
        border-color: #999;
        color: #666;
      }

      .primary-btn:active,
      .btn:active,
      .pizza-btn:active {
        opacity: 0.7;
      }

      .pizza-card {
        border-top: 1.5px solid #000;
        padding-top: 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      .pizza-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 0.5rem;
      }

      .pizza-name {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .pizza-status-label {
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #ccc;
      }

      .pizza-btns {
        display: flex;
        gap: 0.35rem;
      }

      .pizza-btn {
        flex: 1;
        padding: 0.5rem 0.4rem;
        font-size: 0.6rem;
        letter-spacing: 0.05em;
      }

      .error-msg {
        font-size: 0.65rem;
        color: #c0392b;
        letter-spacing: 0.05em;
      }

      .loading {
        color: #bbb;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .logout-btn {
        background: none;
        border: none;
        color: #ccc;
        font-family: "Space Mono", monospace;
        font-size: 0.6rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        margin-top: -1rem;
        text-align: left;
        padding: 0;
      }

      .logout-btn:hover {
        color: #000;
      }
    </style>
  </head>
  <body>
    <h1>Bror — Dashboard</h1>

    <div class="setup" id="setupView">
      <p class="field-label">Hemmelig nøkkel</p>
      <input
        type="password"
        id="keyInput"
        placeholder="••••••••"
        autocomplete="current-password"
      />
      <button class="primary-btn" type="button" onclick="saveKey()">
        Logg inn
      </button>
      <p class="error-msg" id="setupError"></p>
    </div>

    <div class="dashboard" id="dashboardView" style="display: none">
      <p class="loading" id="loadingMsg">Laster…</p>

      <div id="mainContent" style="display: none; flex-direction: column; gap: 2.5rem">
        <div>
          <p class="section-label">Restaurant</p>
          <span class="status-stamp" id="restaurantStamp"></span>
          <div class="btn-group">
            <button class="btn" id="btn-open" type="button" onclick="setStatus('open')">
              Åpen
            </button>
            <button
              class="btn"
              id="btn-almostout"
              type="button"
              onclick="setStatus('almostout')"
            >
              Nesten utsolgt
            </button>
            <button
              class="btn"
              id="btn-outofstock"
              type="button"
              onclick="setStatus('outofstock')"
            >
              Utsolgt
            </button>
            <button class="btn" id="btn-closed" type="button" onclick="setStatus('closed')">
              Stengt
            </button>
          </div>
        </div>

        <div>
          <p class="section-label">Pizza</p>
          <div class="pizza-grid" id="pizzaGrid"></div>
        </div>
      </div>

      <p class="error-msg" id="dashboardError"></p>
      <button class="logout-btn" type="button" onclick="logout()">Logg ut</button>
    </div>

    <script>
      const API =
        "https://bfttnghiuqskmpfsmfep.supabase.co/functions/v1/pizza-status";

      const PIZZAS = __BROR_DASHBOARD_PIZZAS__;

      const STATUS_KEY = {
        Åpen: "open",
        "Nesten utsolgt": "almostout",
        Utsolgt: "outofstock",
        Stengt: "closed",
      };

      let currentData = null;

      function getKey() {
        return localStorage.getItem("pb_key");
      }

      function saveKey() {
        const k = document.getElementById("keyInput").value.trim();
        if (!k) return;
        localStorage.setItem("pb_key", k);
        showDashboard();
        loadStatus();
      }

      function logout() {
        localStorage.removeItem("pb_key");
        document.getElementById("dashboardView").style.display = "none";
        document.getElementById("setupView").style.display = "flex";
        document.getElementById("keyInput").value = "";
      }

      function showDashboard() {
        document.getElementById("setupView").style.display = "none";
        document.getElementById("dashboardView").style.display = "flex";
      }

      async function loadStatus() {
        const key = getKey();
        document.getElementById("loadingMsg").style.display = "block";
        document.getElementById("mainContent").style.display = "none";
        document.getElementById("dashboardError").textContent = "";

        try {
          const res = await fetch(`${API}?key=${encodeURIComponent(key)}`);
          if (res.status === 401) {
            localStorage.removeItem("pb_key");
            logout();
            document.getElementById("setupError").textContent = "Feil nøkkel.";
            return;
          }

          currentData = await res.json();
          renderDashboard();
        } catch {
          document.getElementById("dashboardError").textContent = "Kunne ikke koble til.";
        } finally {
          document.getElementById("loadingMsg").style.display = "none";
        }
      }

      function renderDashboard() {
        const { status, pizzas } = currentData;
        const stamp = document.getElementById("restaurantStamp");
        const activeKey = STATUS_KEY[status];

        stamp.textContent = status;
        stamp.className = `status-stamp ${activeKey ?? ""}`;

        document
          .querySelectorAll(".btn-group .btn")
          .forEach((btn) => btn.classList.remove("active"));
        if (activeKey) {
          document.getElementById(`btn-${activeKey}`)?.classList.add("active");
        }

        const grid = document.getElementById("pizzaGrid");
        grid.innerHTML = "";

        PIZZAS.forEach(({ id, label }) => {
          const pizzaStatus = pizzas[id] ?? null;
          const statusLabel = pizzaStatus ?? "Normal";
          const card = document.createElement("div");

          card.className = "pizza-card";
          card.innerHTML = `
            <div class="pizza-header">
              <span class="pizza-name">${label}</span>
              <span class="pizza-status-label">${statusLabel}</span>
            </div>
            <div class="pizza-btns">
              <button class="pizza-btn ${!pizzaStatus ? "active" : ""}"
                onclick="setPizzaStatus('${id}', 'clear')">Normal</button>
              <button class="pizza-btn ${pizzaStatus === "Nesten utsolgt" ? "active" : ""}"
                onclick="setPizzaStatus('${id}', 'almostout')">Nesten utsolgt</button>
              <button class="pizza-btn ${pizzaStatus === "Utsolgt" ? "active" : ""}"
                onclick="setPizzaStatus('${id}', 'outofstock')">Utsolgt</button>
            </div>`;
          grid.appendChild(card);
        });

        document.getElementById("mainContent").style.display = "flex";
      }

      async function setStatus(set) {
        const key = getKey();
        try {
          const res = await fetch(`${API}?key=${encodeURIComponent(key)}&set=${set}`);
          currentData = await res.json();
          renderDashboard();
        } catch {
          document.getElementById("dashboardError").textContent = "Kunne ikke oppdatere.";
        }
      }

      async function setPizzaStatus(pizza, pizzaset) {
        const key = getKey();
        try {
          const res = await fetch(
            `${API}?key=${encodeURIComponent(key)}&pizza=${pizza}&pizzaset=${pizzaset}`,
          );
          currentData = await res.json();
          renderDashboard();
        } catch {
          document.getElementById("dashboardError").textContent = "Kunne ikke oppdatere.";
        }
      }

      if (getKey()) {
        showDashboard();
        loadStatus();
      }

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && getKey()) loadStatus();
      });
    </script>
  </body>
</html>
