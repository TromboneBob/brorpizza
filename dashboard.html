<!doctype html>
<html lang="nb">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PizzaBros — Dashboard</title>
        <link rel="preconnect" href="https://fonts.bunny.net" />
        <link href="https://fonts.bunny.net/css?family=space-mono:400,700" rel="stylesheet" />
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: "Space Mono", monospace;
                background: #fff;
                color: #000;
                min-height: 100vh;
                padding: 3rem 1rem 5rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2.5rem;
            }

            h1 {
                font-size: .65rem;
                letter-spacing: .3em;
                text-transform: uppercase;
                color: #999;
            }

            /* ── Login ────────────────────────────── */

            .setup {
                width: 100%;
                max-width: 360px;
                display: flex;
                flex-direction: column;
                gap: .75rem;
            }

            .field-label {
                font-size: .6rem;
                letter-spacing: .2em;
                text-transform: uppercase;
                color: #999;
            }

            .setup input {
                width: 100%;
                padding: .75rem 1rem;
                background: #fff;
                border: 1.5px solid #000;
                color: #000;
                font-family: "Space Mono", monospace;
                font-size: .9rem;
                outline: none;
            }

            .setup input:focus { border-color: #000; box-shadow: 2px 2px 0 #000; }

            .primary-btn {
                padding: .8rem;
                background: #000;
                border: 2px solid #000;
                color: #fff;
                font-family: "Space Mono", monospace;
                font-size: .75rem;
                font-weight: 700;
                letter-spacing: .15em;
                text-transform: uppercase;
                cursor: pointer;
            }

            .primary-btn:active { opacity: .7; }

            /* ── Dashboard layout ─────────────────── */

            .dashboard {
                width: 100%;
                max-width: 360px;
                display: flex;
                flex-direction: column;
                gap: 2.5rem;
            }

            .section-label {
                font-size: .55rem;
                letter-spacing: .25em;
                text-transform: uppercase;
                color: #999;
                margin-bottom: 1rem;
            }

            /* ── Current status stamp ─────────────── */

            .status-stamp {
                display: block;
                width: fit-content;
                margin: 0 0 1.5rem;
                padding: .5rem 1.5rem;
                border: 2.5px solid currentColor;
                box-shadow: inset 0 0 0 1.5px currentColor;
                font-size: 1.1rem;
                font-weight: 700;
                letter-spacing: .2em;
                text-transform: uppercase;
                transform: rotate(-1.5deg);
                color: #ccc;
            }

            .status-stamp.open      { color: #1d6840; }
            .status-stamp.almostout { color: #b5551d; }
            .status-stamp.outofstock{ color: #991c1c; }
            .status-stamp.closed    { color: #777; }

            /* ── Status buttons ───────────────────── */

            .btn-group {
                display: flex;
                flex-direction: column;
                gap: .4rem;
            }

            .btn {
                display: flex;
                align-items: center;
                gap: .75rem;
                width: 100%;
                padding: .75rem 1rem;
                background: #fff;
                border: 1.5px solid #ddd;
                color: #bbb;
                font-family: "Space Mono", monospace;
                font-size: .75rem;
                font-weight: 700;
                letter-spacing: .1em;
                text-transform: uppercase;
                text-align: left;
                cursor: pointer;
                transition: border-color .1s;
            }

            .btn::before {
                content: '';
                display: inline-block;
                width: 8px;
                height: 8px;
                border: 1.5px solid #ddd;
                flex-shrink: 0;
            }

            .btn.active {
                background: #000;
                border-color: #000;
                color: #fff;
            }

            .btn.active::before {
                background: #fff;
                border-color: #fff;
            }

            .btn:not(.active):hover {
                border-color: #999;
                color: #666;
            }

            .btn:active { opacity: .7; }

            /* ── Pizza cards ──────────────────────── */

            .pizza-grid {
                display: flex;
                flex-direction: column;
                gap: 1.25rem;
            }

            .pizza-card {
                border-top: 1.5px solid #000;
                padding-top: .75rem;
                display: flex;
                flex-direction: column;
                gap: .6rem;
            }

            .pizza-header {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                gap: .5rem;
            }

            .pizza-name {
                font-size: .8rem;
                font-weight: 700;
                letter-spacing: .08em;
                text-transform: uppercase;
            }

            .pizza-status-label {
                font-size: .6rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: .1em;
                color: #ccc;
            }

            .pizza-btns {
                display: flex;
                gap: .35rem;
            }

            .pizza-btn {
                flex: 1;
                padding: .5rem .4rem;
                background: #fff;
                border: 1.5px solid #ddd;
                color: #bbb;
                font-family: "Space Mono", monospace;
                font-size: .6rem;
                font-weight: 700;
                letter-spacing: .05em;
                text-transform: uppercase;
                cursor: pointer;
                transition: border-color .1s;
            }

            .pizza-btn.active {
                background: #000;
                border-color: #000;
                color: #fff;
            }

            .pizza-btn:not(.active):hover {
                border-color: #999;
                color: #666;
            }

            .pizza-btn:active { opacity: .7; }

            /* ── Misc ─────────────────────────────── */

            .error-msg {
                font-size: .65rem;
                color: #c0392b;
                letter-spacing: .05em;
            }

            .loading {
                color: #bbb;
                font-size: .65rem;
                letter-spacing: .15em;
                text-transform: uppercase;
            }

            .logout-btn {
                background: none;
                border: none;
                color: #ccc;
                font-family: "Space Mono", monospace;
                font-size: .6rem;
                letter-spacing: .1em;
                text-transform: uppercase;
                cursor: pointer;
                margin-top: -1rem;
                text-align: left;
                padding: 0;
            }

            .logout-btn:hover { color: #000; }
        </style>
    </head>
    <body>
        <h1>PizzaBros — Dashboard</h1>

        <div class="setup" id="setupView">
            <p class="field-label">Hemmelig nøkkel</p>
            <input type="password" id="keyInput" placeholder="••••••••" autocomplete="current-password" />
            <button class="primary-btn" onclick="saveKey()">Logg inn</button>
            <p class="error-msg" id="setupError"></p>
        </div>

        <div class="dashboard" id="dashboardView" style="display:none">
            <p class="loading" id="loadingMsg">Laster…</p>

            <div id="mainContent" style="display:none; flex-direction:column; gap:2.5rem">
                <div>
                    <p class="section-label">Restaurant</p>
                    <span class="status-stamp" id="restaurantStamp"></span>
                    <div class="btn-group">
                        <button class="btn" id="btn-open"        onclick="setStatus('open')">Åpen</button>
                        <button class="btn" id="btn-almostout"   onclick="setStatus('almostout')">Nesten utsolgt</button>
                        <button class="btn" id="btn-outofstock"  onclick="setStatus('outofstock')">Utsolgt</button>
                        <button class="btn" id="btn-closed"      onclick="setStatus('closed')">Stengt</button>
                    </div>
                </div>

                <div>
                    <p class="section-label">Pizza</p>
                    <div class="pizza-grid" id="pizzaGrid"></div>
                </div>
            </div>

            <p class="error-msg" id="dashboardError"></p>
            <button class="logout-btn" onclick="logout()">Logg ut</button>
        </div>

        <script>
            const API = 'https://bfttnghiuqskmpfsmfep.supabase.co/functions/v1/pizza-status'

            const PIZZAS = [
                { id: 'margherita',    label: 'Margherita' },
                { id: 'sopp-og-bacon', label: 'Sopp & Bacon' },
                { id: 'romme-og-laks', label: 'Rømme & Laks' },
                { id: 'peperoni',      label: 'Peperoni' },
            ]

            const STATUS_KEY = {
                'Åpen':           'open',
                'Nesten utsolgt': 'almostout',
                'Utsolgt':        'outofstock',
                'Stengt':         'closed',
            }

            let currentData = null

            function getKey() { return localStorage.getItem('pb_key') }

            function saveKey() {
                const k = document.getElementById('keyInput').value.trim()
                if (!k) return
                localStorage.setItem('pb_key', k)
                showDashboard()
                loadStatus()
            }

            function logout() {
                localStorage.removeItem('pb_key')
                document.getElementById('dashboardView').style.display = 'none'
                document.getElementById('setupView').style.display = 'flex'
                document.getElementById('keyInput').value = ''
            }

            function showDashboard() {
                document.getElementById('setupView').style.display = 'none'
                document.getElementById('dashboardView').style.display = 'flex'
            }

            async function loadStatus() {
                const key = getKey()
                document.getElementById('loadingMsg').style.display = 'block'
                document.getElementById('mainContent').style.display = 'none'
                document.getElementById('dashboardError').textContent = ''
                try {
                    const res = await fetch(`${API}?key=${encodeURIComponent(key)}`)
                    if (res.status === 401) {
                        localStorage.removeItem('pb_key')
                        logout()
                        document.getElementById('setupError').textContent = 'Feil nøkkel.'
                        return
                    }
                    currentData = await res.json()
                    renderDashboard()
                } catch {
                    document.getElementById('dashboardError').textContent = 'Kunne ikke koble til.'
                } finally {
                    document.getElementById('loadingMsg').style.display = 'none'
                }
            }

            function renderDashboard() {
                const { status, pizzas } = currentData

                // Stamp
                const stamp = document.getElementById('restaurantStamp')
                stamp.textContent = status
                const activeKey = STATUS_KEY[status]
                stamp.className = 'status-stamp ' + (activeKey ?? '')

                // Highlight active button
                document.querySelectorAll('.btn-group .btn').forEach(btn => btn.classList.remove('active'))
                if (activeKey) {
                    document.getElementById('btn-' + activeKey)?.classList.add('active')
                }

                // Pizza grid
                const grid = document.getElementById('pizzaGrid')
                grid.innerHTML = ''
                PIZZAS.forEach(({ id, label }) => {
                    const pizzaStatus = pizzas[id] ?? null
                    const statusLabel = pizzaStatus ?? 'Normal'

                    const card = document.createElement('div')
                    card.className = 'pizza-card'
                    card.innerHTML = `
                        <div class="pizza-header">
                            <span class="pizza-name">${label}</span>
                            <span class="pizza-status-label">${statusLabel}</span>
                        </div>
                        <div class="pizza-btns">
                            <button class="pizza-btn ${!pizzaStatus ? 'active' : ''}"
                                onclick="setPizzaStatus('${id}', 'clear')">Normal</button>
                            <button class="pizza-btn ${pizzaStatus === 'Nesten utsolgt' ? 'active' : ''}"
                                onclick="setPizzaStatus('${id}', 'almostout')">Nesten utsolgt</button>
                            <button class="pizza-btn ${pizzaStatus === 'Utsolgt' ? 'active' : ''}"
                                onclick="setPizzaStatus('${id}', 'outofstock')">Utsolgt</button>
                        </div>`
                    grid.appendChild(card)
                })

                document.getElementById('mainContent').style.display = 'flex'
            }

            async function setStatus(set) {
                const key = getKey()
                try {
                    const res = await fetch(`${API}?key=${encodeURIComponent(key)}&set=${set}`)
                    currentData = await res.json()
                    renderDashboard()
                } catch {
                    document.getElementById('dashboardError').textContent = 'Kunne ikke oppdatere.'
                }
            }

            async function setPizzaStatus(pizza, pizzaset) {
                const key = getKey()
                try {
                    const res = await fetch(`${API}?key=${encodeURIComponent(key)}&pizza=${pizza}&pizzaset=${pizzaset}`)
                    currentData = await res.json()
                    renderDashboard()
                } catch {
                    document.getElementById('dashboardError').textContent = 'Kunne ikke oppdatere.'
                }
            }

            // Init
            if (getKey()) {
                showDashboard()
                loadStatus()
            }

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && getKey()) loadStatus()
            })
        </script>
    </body>
</html>
