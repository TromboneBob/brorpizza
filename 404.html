<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Siden finnes ikke | Bror</title>
    <meta
      name="description"
      content="Siden finnes ikke. Gå tilbake til Bror sin forside for meny, status og kontaktinformasjon."
    />

    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.bunny.net/css?family=space-mono:400,700|im-fell-english:400i"
    />
    <link
      href="https://fonts.bunny.net/css?family=space-mono:400,700|im-fell-english:400i"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.bunny.net/css?family=space-mono:400,700|im-fell-english:400i"
        rel="stylesheet"
      />
    </noscript>
    <!-- bror-site-css -->
  </head>
  <body>
    <div id="app">
      <main class="error-page">
        <a class="logo" href="/" aria-label="Gå til forsiden">
          <img src="/bror-logo.svg" alt="Bror logo" />
        </a>

        <p class="tagline">Surdeigspizza</p>

        <section class="error-copy" aria-labelledby="error-title">
          <p class="error-code">404</p>
          <h1 id="error-title">Siden finnes ikke</h1>
          <p>
            Lenken kan være gammel, eller adressen kan være skrevet feil. På
            forsiden finner du meny, status og kontaktinformasjon.
          </p>
          <a class="home-link" href="/">Til forsiden</a>
          <a class="report-link" href="mailto:hei@brorpizza.no?subject=Feil%20lenke%20på%20brorpizza.no">
            Meld fra om feil lenke
          </a>
        </section>

        <footer>BROR © 2026</footer>
      </main>
    </div>
  </body>
</html>
